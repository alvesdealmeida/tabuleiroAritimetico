<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Math Quest Horizontal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37; --bg-dark: #0f2010;
            --cell-bg: #f9d978; --cell-text: #5d4037;
            --danger: #e74c3c; --success: #2ecc71;
        }
        * { touch-action: manipulation; box-sizing: border-box; }
        
        body {
            margin: 0; background: #000; font-family: 'Nunito', sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden; color: white;
        }

        /* Container no formato Celular Deitado */
        .game-wrapper {
            width: 95vw; height: 90vh; max-width: 900px; max-height: 500px;
            background: linear-gradient(180deg, #1e3a1e 0%, #0a150a 100%);
            border: 4px solid var(--primary); border-radius: 20px;
            display: grid; 
            grid-template-columns: 180px 1fr; /* Coluna lateral para status */
            grid-template-rows: 1fr 100px; /* Linha inferior para expressão */
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* Barra Lateral de Status */
        .sidebar {
            grid-row: 1 / 2; grid-column: 1 / 2;
            background: rgba(0,0,0,0.5); border-right: 2px solid var(--primary);
            display: flex; flex-direction: column; justify-content: space-around;
            align-items: center; padding: 10px;
        }

        /* Tabuleiro Centralizado */
        .board {
            grid-row: 1 / 2; grid-column: 2 / 3;
            display: grid; grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(6, 1fr); gap: 5px; padding: 15px;
        }

        /* Área da Expressão (Rodapé) */
        .expression-area {
            grid-row: 2 / 3; grid-column: 1 / 3;
            background: rgba(0,0,0,0.8); border-top: 3px solid var(--primary);
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }

        .tile {
            background: linear-gradient(145deg, #f9d978, #d4af37);
            border-radius: 5px; display: flex; align-items: center; justify-content: center;
            color: var(--cell-text); font-family: 'Fredoka One'; font-size: 16px; 
            cursor: pointer; box-shadow: 0 3px 0 #8a6d3b;
        }
        .tile.empty { opacity: 0.1; pointer-events: none; box-shadow: none; }

        .slot {
            width: 50px; height: 50px; border: 2px dashed var(--primary);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-family: 'Fredoka One'; font-size: 22px;
        }
        .slot.filled { background: var(--cell-bg); color: var(--cell-text); border: none; }

        .medal-tag { font-family: 'Fredoka One'; padding: 5px 15px; border-radius: 15px; font-size: 14px; width: 100%; text-align: center; }
        .bronze { background: #cd7f32; } .prata { background: #c0c0c0; color: #000; } .ouro { background: #ffd700; color: #000; }

        #feedback {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Fredoka One'; font-size: 60px; z-index: 100; display: none;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="sidebar">
        <button onclick="togglePause()" style="background:none; border:none; color:var(--primary); font-size:30px; cursor:pointer;">⏸</button>
        <div id="medal-display" class="medal-tag bronze">BRONZE</div>
        <div style="text-align: center;">
            <div style="font-size: 12px; color: #888;">PONTOS</div>
            <div id="score" style="font-size: 24px; font-family: 'Fredoka One'; color: var(--primary);">0</div>
        </div>
        <div id="timer" style="font-family: monospace; font-size: 20px;">00.00</div>
    </div>

    <div id="feedback">BOA!</div>
    <div class="board" id="board"></div>

    <div class="expression-area">
        <div id="slots-container" style="display:flex; align-items:center; gap:10px;"></div>
    </div>
</div>

</script>
</body>
</html>
